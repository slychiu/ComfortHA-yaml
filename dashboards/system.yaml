views:
- type: sections
  title: Config Files
  sections:
  - type: grid
    cards:
    - type: sensor
      entity: sensor.cytech_version
      name: System Version
      graph: none
    - type: markdown
      content: '{# cytech_dashboard_v2 #}{% set pending = states(''sensor.cytech_update_pending'') %}{% if pending not in ['''', ''unknown'', ''unavailable''] %}{{ state_attr(''sensor.cytech_pending_message'', ''message'') | default('''') }}{% else %}{{ state_attr(''sensor.cytech_last_result'', ''message'') | default('''') }}{% endif %}'
    - type: grid
      columns: 3
      square: false
      cards:
      - type: button
        name: Check for Update
        icon: mdi:cloud-search
        tap_action:
          action: call-service
          service: shell_command.cytech_check_only
      - type: conditional
        conditions:
        - condition: state
          entity: sensor.cytech_update_pending
          state_not: ''
        card:
          type: button
          name: Update Now
          icon: mdi:update
          tap_action:
            action: call-service
            service: shell_command.cytech_check_update
      - type: conditional
        conditions:
        - condition: state
          entity: sensor.cytech_update_pending
          state_not: ''
        card:
          type: button
          name: Skip this version
          icon: mdi:update-lock
          tap_action:
            action: call-service
            service: shell_command.cytech_reject_update
    - type: conditional
      conditions:
      - condition: state
        entity: input_text.automatic_test_result
        state_not: ''
      card:
        type: entities
        title: Automatic Test Result
        entities:
        - entity: input_text.automatic_test_result
          name: Result
  - type: grid
    cards:
    - type: markdown
      content: |-
        ## Remote Support Access

        Turning this on lets Cytech support connect to this system remotely
        for troubleshooting. It turns itself back off automatically after
        **1 hour** if you don't turn it off first.

        Contact support@cytech.biz
    - type: entities
      entities:
      - entity: input_boolean.remote_support_access
        name: Remote Support Access
    - type: markdown
      content: >-
        {% if is_state('input_boolean.remote_support_access', 'on') %}
        Active until
        {{ as_timestamp(state_attr('timer.remote_support_access', 'finishes_at')) | timestamp_custom('%H:%M') }}.
        {% else %}
        Currently off.
        {% endif %}
