# v22: adds the Remote Support Access toggle (input_boolean/timer/automations
# below) and its two shell_command entries -- see enable_remote_support.sh /
# disable_remote_support.sh and ensure_ssh_admin_access() in first_boot.sh.
# v25: comment-only bump so cytech_update.sh's auto-restart trigger fires on
# already-deployed devices -- the actual fix this release ships lives only in
# first_boot.sh's apply_usb_host_mode_fix() (see that function for detail).
# v27: adds cytech_check_hdmi shell_command + sensor for the pre-ship
# automatic test harness's HDMI-monitor-detected-at-boot check.
shell_command:
  cytech_check_only: "nohup bash /config/cytech_check_only.sh </dev/null >> /config/cytech_update.log 2>&1 &"
  cytech_check_update: "nohup bash /config/cytech_update.sh </dev/null >> /config/cytech_update.log 2>&1 &"
  cytech_reject_update: "nohup bash /config/cytech_reject_update.sh </dev/null >> /config/cytech_update.log 2>&1 &"
  cytech_clear_notify: "rm -f /config/.cytech_notify_pending"
  # The reset watcher runs as an init_command inside the SSH addon's own
  # container, which now stays up permanently (see ensure_ssh_admin_access
  # in first_boot.sh) instead of being started/stopped around each reset --
  # so the button just needs to drop the trigger file; the watcher is
  # already there to pick it up within 5 seconds. Historically (through
  # 2026-07-04) this had to explicitly start the addon and inject a
  # throwaway credential first, since the addon used to be off in its
  # normal steady state and its own init-ssh script hard-exits if it has no
  # credential at all -- both of those problems went away once the addon
  # stopped turning off in the first place.
  dev_reset: "touch /config/.reset_requested"
  enable_remote_support: "nohup bash /config/enable_remote_support.sh </dev/null >> /config/cytech_update.log 2>&1 &"
  disable_remote_support: "nohup bash /config/disable_remote_support.sh </dev/null >> /config/cytech_update.log 2>&1 &"
  cytech_check_hdmi: "nohup bash /config/cytech_check_hdmi.sh </dev/null >> /config/cytech_update.log 2>&1 &"

input_boolean:
  remote_support_access:
    name: "Remote Support Access"
    icon: mdi:account-key

input_text:
  automatic_test_result:
    name: "Automatic Test Result"
    max: 255
    icon: mdi:clipboard-check-outline

timer:
  remote_support_access:
    name: "Remote Support Access"
    duration: "01:00:00"

command_line:
  - sensor:
      name: "Cytech HDMI Result"
      unique_id: cytech_hdmi_result_sensor
      command: "cat /config/.cytech_hdmi_result 2>/dev/null || echo '{}'"
      value_template: "{{ value_json.ts | default('') }}"
      json_attributes:
        - message
      scan_interval: 30
  - sensor:
      name: "Cytech Version"
      unique_id: cytech_version_sensor
      command: "cat /config/.cytech_version 2>/dev/null || echo unknown"
      scan_interval: 60
  - sensor:
      # State is just the write timestamp (so the sensor reliably updates
      # even when the message text is unchanged); the actual text lives in
      # the "message" attribute, not the state. Sensor states are capped at
      # 255 characters in HA -- anything longer silently becomes "unknown",
      # which is exactly what broke this once warning text got appended.
      # Attributes have no such limit.
      name: "Cytech Notify Pending"
      unique_id: cytech_notify_pending_sensor
      command: "cat /config/.cytech_notify_pending 2>/dev/null || echo '{}'"
      value_template: "{{ value_json.ts | default('') }}"
      json_attributes:
        - message
      scan_interval: 30
  - sensor:
      # Same content as Cytech Notify Pending, but that file gets deleted by
      # the automation below right after showing its one-time popup -- this
      # one is written at the same time but only cleared when the update is
      # actually applied or skipped, so the Config Files dashboard has
      # something stable to read while a decision is still pending.
      name: "Cytech Pending Message"
      unique_id: cytech_pending_message_sensor
      command: "cat /config/.cytech_pending_message 2>/dev/null || echo '{}'"
      value_template: "{{ value_json.ts | default('') }}"
      json_attributes:
        - message
      scan_interval: 30
  - sensor:
      name: "Cytech Update Pending"
      unique_id: cytech_update_pending_sensor
      command: "cat /config/.cytech_update_pending 2>/dev/null || echo ''"
      scan_interval: 30
  - sensor:
      name: "Cytech Last Result"
      unique_id: cytech_last_result_sensor
      command: "cat /config/.cytech_last_result 2>/dev/null || echo '{}'"
      value_template: "{{ value_json.ts | default('') }}"
      json_attributes:
        - message
      scan_interval: 30
  - sensor:
      # Written by check_config_integrity in first_boot.sh's maintenance pass
      # (every boot) when configuration.yaml or any .storage/* file fails to
      # parse -- the same failure signature both 2026 SD card corruption
      # incidents produced. Deliberately a separate file/sensor from
      # cytech_notify_pending/cytech_last_result: those are update-flow
      # specific, and an integrity alert firing during a pending update would
      # otherwise clobber the update notification text.
      name: "Cytech Integrity Alert"
      unique_id: cytech_integrity_alert_sensor
      command: "cat /config/.cytech_integrity_alert 2>/dev/null || echo '{}'"
      value_template: "{{ value_json.ts | default('') }}"
      json_attributes:
        - message
      scan_interval: 30

automation:
  - id: cytech_show_integrity_alert
    alias: "Cytech: Show data integrity alert"
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.cytech_integrity_alert
    condition:
      - condition: template
        value_template: "{{ states('sensor.cytech_integrity_alert') not in ['', 'unknown', 'unavailable'] }}"
    action:
      - service: persistent_notification.create
        data:
          title: "Cytech: data integrity issue detected"
          message: "{{ state_attr('sensor.cytech_integrity_alert', 'message') }}"
          notification_id: cytech_integrity_alert

  - id: cytech_show_notification
    alias: "Cytech: Show update notification"
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.cytech_notify_pending
    condition:
      - condition: template
        value_template: "{{ states('sensor.cytech_notify_pending') not in ['', 'unknown', 'unavailable'] }}"
    action:
      - service: persistent_notification.create
        data:
          title: "Cytech configuration update"
          message: "{{ state_attr('sensor.cytech_notify_pending', 'message') }}"
          notification_id: cytech_config_update
      - service: shell_command.cytech_clear_notify

  - id: cytech_remote_support_enabled
    alias: "Cytech: Remote support access enabled"
    mode: single
    trigger:
      - platform: state
        entity_id: input_boolean.remote_support_access
        to: "on"
    action:
      - service: shell_command.enable_remote_support
      - service: timer.start
        target:
          entity_id: timer.remote_support_access

  - id: cytech_remote_support_disabled
    alias: "Cytech: Remote support access disabled"
    mode: single
    trigger:
      - platform: state
        entity_id: input_boolean.remote_support_access
        to: "off"
    action:
      - service: shell_command.disable_remote_support
      - service: timer.cancel
        target:
          entity_id: timer.remote_support_access

  - id: cytech_remote_support_timer_expired
    alias: "Cytech: Remote support access timer expired"
    mode: single
    trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.remote_support_access
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.remote_support_access
